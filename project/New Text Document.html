<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raj | Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    max-width:600px;
    padding:30px;
}

h1{
    font-size:4rem;
    margin-bottom:10px;
}

.role{
    font-size:1.2rem;
    color:#ccc;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:25px;
    font-weight:bold;
    margin-bottom:35px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

#about{
    margin-top:20px;
}

h2{
    margin-bottom:15px;
}

p{
    line-height:1.7;
}
</style>

</head>
<body>

<div class="container">

    <h1>Raj</h1>

    <p class="role">Artist • Gamer • Content Creator</p>

    <a href="#about" class="btn">About Me</a>

    <section id="about">
        <h2>About Me</h2>

        <p>
            Hi, I'm Raj, a YouTube content creator who enjoys making art videos.
        </p>

        <p>
            I am a passionate artist and gamer who loves creating and sharing my work with others.
        </p>
    </section>

</div>

</body>
</html>
